# Cloudflare Workers 配置（Astro 6 + @astrojs/cloudflare v13）
# 本地开发使用 astro dev + @astrojs/node（workerd 在 Windows 上可能 access violation）
# 生产构建：DEPLOY_ENV=production pnpm build && npx wrangler deploy

name = "devjournal"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# main 留空：@astrojs/cloudflare 会在构建时生成 dist/server/wrangler.json
# 并指向真正的 worker 入口；若在这里写 main，Cloudflare Vite 插件会在构建前校验文件是否存在而报错

# 静态资源目录；_worker.js / _routes.json 通过 dist/.assetsignore 排除
[assets]
directory = "./dist"
binding = "ASSETS"

# D1 数据库 — 存储 better-auth 用户和会话表
[[d1_databases]]
binding = "DB"
database_name = "devjournal-auth"
database_id = "9e007ab5-c475-4757-9562-530662f079a9"

# KV 命名空间 — session 缓存 + 阅读量计数
[[kv_namespaces]]
binding = "KV"
id = "a2d61cb8ce1b4c4da9b991526589fe8c"
