# Cloudflare Workers 配置（Astro 6 + @astrojs/cloudflare v13）
# 本地开发使用 astro dev + @astrojs/node（workerd 在 Windows 上可能 access violation）
# 生产构建：DEPLOY_ENV=production pnpm build && npx wrangler deploy

name = "devjournal"
main = "dist/_worker.js/index.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# 静态资源目录；_worker.js / _routes.json 通过 dist/.assetsignore 排除
[assets]
directory = "./dist"
binding = "ASSETS"

# D1 数据库 — 存储 better-auth 用户和会话表
# 不填 database_id，首次 wrangler deploy 会自动预配并写回 ID
[[d1_databases]]
binding = "DB"
database_name = "devjournal-auth"

# KV 命名空间 — session 缓存 + 阅读量计数
# 不填 id，首次 wrangler deploy 会自动预配并写回 ID
[[kv_namespaces]]
binding = "KV"
